<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML Artifact</title>
<style>
:root{
  --ivory:#FAF9F5;--paper:#fff;--slate:#141413;--clay:#D97757;--oat:#E3DACC;
  --g100:#F0EEE6;--g300:#D1CFC5;--g500:#87867F;--g700:#3D3D3A;
  --serif:ui-serif,Georgia,"Times New Roman",Times,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;
}
*{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--ivory);color:var(--slate);font-family:var(--sans);line-height:1.55}
.wrap{max-width:1120px;margin:0 auto;padding:0 32px 110px}.masthead{padding:72px 0 44px;border-bottom:1.5px solid var(--g300)}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--g500);display:flex;gap:12px;align-items:center}.eyebrow:before{content:"";width:24px;height:1.5px;background:var(--clay)}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(38px,5.4vw,62px);line-height:1.06;letter-spacing:-.018em;margin:18px 0 0;max-width:18ch}.intro{max-width:680px;color:var(--g700);font-size:16.5px;margin:22px 0 0}
.toc{display:flex;flex-wrap:wrap;gap:8px;padding-top:24px}.toc a{font-size:12.5px;padding:7px 14px;border:1.5px solid var(--g300);border-radius:999px;text-decoration:none;color:var(--g700);background:var(--paper)}.toc .n{font-family:var(--mono);font-size:10px;color:var(--g500)}
section{margin-top:64px;scroll-margin-top:28px}.sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:10px}.idx{font-family:var(--mono);font-size:13px;color:var(--clay);font-weight:700;width:34px;flex-shrink:0}h2{font-family:var(--serif);font-weight:500;font-size:27px;margin:0;letter-spacing:-.012em}.sec-intro{font-size:14.5px;color:var(--g700);max-width:720px;margin:0 0 24px 50px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-left:50px}.card{background:var(--paper);border:1.5px solid var(--g300);border-radius:14px;padding:20px;color:inherit;text-decoration:none;transition:transform .15s,box-shadow .15s,border-color .15s}.card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(20,20,19,.10);border-color:var(--slate)}.card h3{font-family:var(--serif);font-size:21px;font-weight:500;margin:0 0 8px}.card p{margin:0;color:var(--g700);font-size:13.5px}.meta{margin-top:16px;padding-top:11px;border-top:1px solid var(--g100);font-family:var(--mono);font-size:11px;color:var(--g500)}
@media(max-width:640px){.wrap{padding:0 20px 80px}.sec-intro,.grid{margin-left:0}}
</style>
</head>
<body>
<div class="wrap">
<header class="masthead">
  <div class="eyebrow">Artifact</div>
  <h1>替换为一个精确的 editorial title。</h1>
  <p class="intro">说明这个 artifact 帮助读者理解什么，或做出什么决定。</p>
  <nav class="toc" aria-label="目录"><a href="#section-1"><span class="n">01</span> 章节</a></nav>
</header>
<main>
  <section id="section-1">
    <div class="sec-head"><span class="idx">01</span><h2>章节标题</h2></div>
    <p class="sec-intro">简短说明本 section 的上下文。</p>
    <div class="grid">
      <article class="card"><h3>卡片标题</h3><p>具体内容、trade-off、step 或 finding。</p><div class="meta">artifact.html</div></article>
    </div>
  </section>
</main>
</div>
</body>
</html>
